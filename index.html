<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bronzeman Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-noise"></div>

  <main class="app-shell">
    <header class="hero stream-hero">
      <div>
        <h1>Bronzeman</h1>
      </div>

      <section class="point-panel" aria-label="Point totals">
        <div class="point-stat primary">
          <span class="point-icon">BP</span>
          <div>
            <span class="stat-label">UNLOCKS</span>
            <strong id="availablePoints">0</strong>
          </div>
        </div>
        <div class="point-stat">
          <span class="point-icon kp">KP</span>
          <div>
            <span class="stat-label">SHOP</span>
            <strong id="killPoints">0</strong>
          </div>
        </div>
        <div class="point-breakdown" aria-label="Point breakdown">
          <span><b id="earnedPoints">0</b> earned</span>
          <span><b id="spentPoints">0</b> spent</span>
          <span><b id="shopSpent">0</b> shop</span>
        </div>
      </section>
    </header>

    <nav class="tabs" aria-label="Progress sections">
      <button class="tab-button active" type="button" data-tab="tasks" aria-selected="true">Tasks</button>
      <button class="tab-button" type="button" data-tab="talents" aria-selected="false">Talents</button>
      <button class="tab-button" type="button" data-tab="shop" aria-selected="false">Shop</button>
    </nav>

    <section class="tab-panel active" id="tasksPanel">
      <section class="section-heading compact-heading">
        <h2>Tasks</h2>
        <div class="progress-summary">
          <span id="challengeProgress">0 / 60</span>
          <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
        </div>
      </section>

      <section class="kill-counter" aria-label="Player kill counter">
        <h3>Player Kills</h3>
        <div class="kill-controls">
          <button id="removeKillButton" type="button" aria-label="Remove one player kill">-</button>
          <input id="playerKills" type="number" min="0" step="1" value="0" aria-label="Player kills" />
          <button id="addKillButton" type="button" aria-label="Add one player kill">+</button>
        </div>
      </section>

      <section class="challenge-area">
        <article class="challenge-card pvm-card">
          <div class="card-header">
            <h3>PVM</h3>
            <span class="challenge-count" id="pvmCount">0 / 30</span>
          </div>
          <div class="challenge-list staged" id="pvmList"></div>
        </article>

        <article class="challenge-card pvp-card">
          <div class="card-header">
            <h3>PVP</h3>
            <span class="challenge-count" id="pvpCount">0 / 30</span>
          </div>
          <div class="challenge-list" id="pvpList"></div>
        </article>
      </section>
    </section>

    <section class="tab-panel" id="talentsPanel">
      <section class="section-heading compact-heading">
        <h2>Talents</h2>
      </section>

      <section class="tree-wrap" aria-label="Bronzeman unlock tree">
        <div class="tree-legend">
          <span><i class="legend-dot available"></i>Available</span>
          <span><i class="legend-dot locked"></i>Locked</span>
          <span><i class="legend-dot purchased"></i>Bought</span>
        </div>
        <div class="talent-tree" id="talentTree"></div>
      </section>
    </section>

    <section class="tab-panel" id="shopPanel">
      <section class="section-heading compact-heading">
        <h2>Shop</h2>
      </section>

      <section class="shop-grid" id="shopList" aria-label="Consumable shop"></section>
    </section>

    <footer class="stream-footer">
      <p>Saved locally</p>
      <button id="resetButton" class="reset-button" type="button">Reset</button>
    </footer>
  </main>

  <template id="challengeTemplate">
    <label class="challenge-item">
      <input type="checkbox" />
      <span class="checkmark" aria-hidden="true">OK</span>
      <span class="challenge-text"></span>
      <span class="point-reward">+1 BP</span>
    </label>
  </template>

  <script src="app.js"></script>
</body>
</html>
